<!-- UPDATED index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nako Hikari</title>

<style>
:root{
    --bg-color:#0e0e11;
    --container-bg:#18181f;
    --input-bg:#0f0f12;
    --box-bg:#0f0f12;

    --accent-dark:#663657;
    --accent-light:#A77A99;
    --accent-light-hover:#c5a4bc;

    --text-main:#b4b4bc;
    --text-muted:#5a5a66;
    --text-bright:#ffffff;

    --border-color:#2d2d38;

    --space-xs:4px;
    --space-sm:8px;
    --space-md:12px;
    --space-lg:16px;
    --space-xl:20px;
    --space-2xl:24px;

    --radius-sm:4px;
    --radius-md:6px;
    --radius-lg:8px;

    --transition-fast:0.15s cubic-bezier(0.4,0,0.2,1);
    --transition-normal:0.2s cubic-bezier(0.4,0,0.2,1);

    --max-width:900px;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    -webkit-tap-highlight-color:transparent;
}

body{
    background:var(--bg-color);
    color:var(--text-main);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    padding-top:60px;
}

/* HEADER */

.site-header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;
    background:var(--bg-color);
    border-bottom:1px solid var(--border-color);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.header-inner{
    width:100%;
    max-width:var(--max-width);
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    padding:0 var(--space-lg);
}

.settings-btn{
    position:absolute;
    left:var(--space-lg);

    width:38px;
    height:38px;

    border-radius:var(--radius-md);
    border:1px solid var(--border-color);

    background:var(--container-bg);

    display:flex;
    justify-content:center;
    align-items:center;

    cursor:pointer;

    transition:
        border-color var(--transition-fast),
        background-color var(--transition-fast),
        transform var(--transition-fast);
}

.settings-btn:hover{
    border-color:var(--accent-light);
}

.settings-btn:active{
    transform:scale(0.92);
    background:var(--accent-dark);
}

.site-title{
    font-size:1.25rem;
    letter-spacing:0.25em;
    text-transform:uppercase;
    user-select:none;
}

.title-bold{
    color:white;
    font-weight:800;
}

/* SIDEBAR */

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);

    opacity:0;
    visibility:hidden;

    transition:opacity var(--transition-normal);

    z-index:1500;
}

.overlay.visible{
    opacity:1;
    visibility:visible;
}

.side-tab{
    position:fixed;

    top:0;
    left:-280px;

    width:280px;
    height:100%;

    background:var(--container-bg);

    border-right:1px solid var(--border-color);

    z-index:2000;

    transition:left var(--transition-normal);

    padding:var(--space-2xl) var(--space-lg);

    display:flex;
    flex-direction:column;
    gap:var(--space-xl);
}

.side-tab.open{
    left:0;
}

.side-tab-header{
    border-bottom:1px solid var(--border-color);
    padding-bottom:var(--space-md);
}

.side-tab-header h4{
    color:white;
    font-family:monospace;
}

.side-links{
    display:flex;
    flex-direction:column;
    gap:var(--space-md);
}

.side-links a{
    color:var(--text-main);
    text-decoration:none;

    font-family:monospace;

    padding:var(--space-sm) var(--space-md);

    border-radius:var(--radius-sm);

    transition:
        background-color var(--transition-fast),
        color var(--transition-fast);
}

.side-links a:hover{
    background:var(--box-bg);
    color:white;
}

.side-links a:active{
    background:var(--accent-dark);
}

/* MAIN */

.page-wrapper{
    width:100%;
    max-width:var(--max-width);

    margin:0 auto;

    padding:var(--space-2xl) var(--space-lg);
}

.main-container{
    background:var(--container-bg);

    border:1px solid var(--border-color);

    border-radius:var(--radius-lg);

    padding:var(--space-2xl);

    display:flex;
    flex-direction:column;
    gap:var(--space-xl);
}

.intro-text h1{
    color:white;
    font-size:1.5rem;
    line-height:1.3;

    font-family:"Courier New",monospace;
}

.intro-text p{
    margin-top:var(--space-xs);

    color:var(--text-muted);

    font-family:"Courier New",monospace;
}

/* GRID */

.nav-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:var(--space-lg);
}

.grid-card{
    background:var(--box-bg);

    border:1px solid var(--border-color);

    border-radius:var(--radius-lg);

    min-height:190px;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    text-decoration:none;

    position:relative;
    overflow:hidden;

    cursor:pointer;

    transition:
        border-color var(--transition-fast),
        background-color var(--transition-fast),
        transform var(--transition-fast);
}

.grid-card:hover{
    border-color:var(--accent-light);
}

.grid-card:active{
    transform:scale(0.98);
    background:#1e1924;
}

.grid-card h2{
    color:white;

    font-family:"Courier New",monospace;

    font-size:1.1rem;

    margin-bottom:var(--space-xl);

    text-align:center;

    z-index:2;
}

/* CUBE */

.cube-viewport{
    width:70px;
    height:70px;

    perspective:300px;

    display:flex;
    justify-content:center;
    align-items:center;
}

.cube-object{
    width:50px;
    height:50px;

    position:relative;

    transform-style:preserve-3d;

    transform:rotateX(-20deg) rotateY(25deg);

    animation:idleFloat 6s ease-in-out infinite alternate;
}

.cube-face{
    position:absolute;

    width:50px;
    height:50px;

    background-image:url('assets/minecraft/r-un.png');
    background-size:cover;

    image-rendering:pixelated;
}

.face-front  { transform: rotateY(0deg) translateZ(25px); }
.face-back   { transform: rotateY(180deg) translateZ(25px); }
.face-left   { transform: rotateY(-90deg) translateZ(25px); }
.face-right  { transform: rotateY(90deg) translateZ(25px); }
.face-top    { transform: rotateX(90deg) translateZ(25px); }
.face-bottom { transform: rotateX(-90deg) translateZ(25px); }

@keyframes idleFloat{
    0%{
        transform:
            rotateX(-15deg)
            rotateY(20deg)
            translateY(0px);
    }

    100%{
        transform:
            rotateX(-25deg)
            rotateY(40deg)
            translateY(-6px);
    }
}

.placeholder-text{
    color:white;
    font-family:"Courier New",monospace;
}

/* MOBILE */

@media(max-width:600px){

    .nav-grid{
        grid-template-columns:1fr 1fr;
    }

    .page-wrapper{
        padding:var(--space-lg) var(--space-sm);
    }

}
</style>
</head>
<body>

<header class="site-header">

    <div class="header-inner">

        <button class="settings-btn" id="openSidebar">

            <svg viewBox="0 0 24 24"
            style="width:20px;height:20px;fill:#ffffff;">
                <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
            </svg>

        </button>

        <div class="site-title">
            <span class="title-bold">NAKO HIKARI</span>
        </div>

    </div>

</header>

<div class="overlay" id="overlay"></div>

<nav class="side-tab" id="sidebar">

    <div class="side-tab-header">
        <h4>SETTINGS</h4>
    </div>

    <div class="side-links">

        <a href="pages/about.html">About</a>

        <a href="pages/supporters.html">Supporters</a>

        <a href="pages/credits.html">Credits</a>

    </div>

</nav>

<div class="page-wrapper">

    <main class="main-container">

        <div class="intro-text">

            <h1>
                minecraft command creations
            </h1>

            <p>
                visual showcase platform for minecraft bedrock commands
            </p>

        </div>

        <div class="nav-grid">

            <a href="pages/commands.html"
            class="grid-card">

                <h2>
                    COMMAND BLOCK CREATION
                </h2>

                <div class="cube-viewport">

                    <div class="cube-object">

                        <div class="cube-face face-front"></div>
                        <div class="cube-face face-back"></div>
                        <div class="cube-face face-left"></div>
                        <div class="cube-face face-right"></div>
                        <div class="cube-face face-top"></div>
                        <div class="cube-face face-bottom"></div>

                    </div>

                </div>

            </a>

            <div class="grid-card">

                <div class="placeholder-text">
                    RANDOM PICK
                </div>

            </div>

        </div>

    </main>

</div>

<script>
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');

document.getElementById('openSidebar')
.onclick = () => {

    sidebar.classList.add('open');
    overlay.classList.add('visible');

};

overlay.onclick = () => {

    sidebar.classList.remove('open');
    overlay.classList.remove('visible');

};
</script>

</body>
</html>
