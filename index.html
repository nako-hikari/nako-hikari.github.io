
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nako Hikari</title>

<style>
:root {
    --bg-color: #0e0e11;
    --container-bg: #18181f;
    --input-bg: #0f0f12;
    --box-bg: #0f0f12;

    --accent-dark: #663657;
    --accent-dark-hover: #81456e;
    --accent-light: #A77A99;
    --accent-light-hover: #c5a4bc;

    --text-main: #b4b4bc;
    --text-muted: #5a5a66;
    --text-bright: #ffffff;

    --border-color: #2d2d38;

    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 12px;
    --space-lg: 16px;
    --space-xl: 20px;
    --space-2xl: 24px;

    --radius-sm: 4px;
    --radius-md: 6px;
    --radius-lg: 8px;

    --transition-fast: 0.15s cubic-bezier(0.4,0,0.2,1);
    --transition-normal: 0.2s cubic-bezier(0.4,0,0.2,1);

    --shadow-deep: 0 6px 16px rgba(0,0,0,0.6);

    --max-width: 900px;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    -webkit-tap-highlight-color: transparent;
}

body{
    background:var(--bg-color);
    color:var(--text-main);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    padding-top:60px;
}

/* HEADER */

.site-header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;

    background:var(--bg-color);

    border-bottom:1px solid var(--border-color);

    display:flex;
    justify-content:center;
    align-items:center;

    z-index:1000;
}

.header-inner{
    width:100%;
    max-width:var(--max-width);

    display:flex;
    align-items:center;

    position:relative;

    padding:0 var(--space-lg);
}

.settings-btn{
    background: var(--container-bg);
    border: 1px solid var(--border-color);

    width:38px;
    height:38px;

    border-radius: var(--radius-md);

    display:flex;
    justify-content:center;
    align-items:center;

    cursor:pointer;

    position:absolute;
    left:var(--space-lg);

    transition:
        border-color var(--transition-fast),
        background-color var(--transition-fast),
        transform var(--transition-fast);
}

.settings-btn:hover{
    border-color:var(--accent-light);
}

.settings-btn:active{
    transform:scale(0.92);
    background:var(--accent-dark);
}

.site-title{
    margin:0 auto;

    letter-spacing:0.25em;
    text-transform:uppercase;

    user-select:none;
}

.title-bold{
    color:white;
    font-weight:800;
}

/* SIDEBAR */

.overlay{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.4);

    opacity:0;
    visibility:hidden;

    z-index:1500;

    transition:opacity var(--transition-normal);
}

.overlay.visible{
    opacity:1;
    visibility:visible;
}

.side-tab{
    position:fixed;

    top:0;
    left:-280px;

    width:280px;
    height:100%;

    background:var(--container-bg);

    border-right:1px solid var(--border-color);

    z-index:2000;

    transition:left var(--transition-normal);

    padding:var(--space-2xl) var(--space-lg);

    display:flex;
    flex-direction:column;
    gap:var(--space-xl);
}

.side-tab.open{
    left:0;
}

.side-tab-header{
    display:flex;
    justify-content:space-between;
    align-items:center;

    border-bottom:1px solid var(--border-color);

    padding-bottom:var(--space-md);
}

.side-tab-header h4{
    color:white;
    font-family:monospace;
}

.close-btn{
    background:none;
    border:none;

    color:white;

    font-size:20px;

    cursor:pointer;
}

.side-links{
    display:flex;
    flex-direction:column;
    gap:var(--space-md);
}

.side-links a{
    color:var(--text-main);

    text-decoration:none;

    font-family:monospace;

    padding:var(--space-sm) var(--space-md);

    border-radius:var(--radius-sm);

    transition:
        background-color var(--transition-fast),
        color var(--transition-fast);
}

.side-links a:hover{
    background:var(--box-bg);
    color:white;
}

.side-links a:active{
    background:var(--accent-dark);
}

/* MAIN */

.page-wrapper{
    width:100%;
    max-width:var(--max-width);

    margin:0 auto;

    padding:var(--space-2xl) var(--space-lg);
}

.main-container{
    background:var(--container-bg);

    border:1px solid var(--border-color);

    border-radius:var(--radius-lg);

    box-shadow:var(--shadow-deep);

    padding:var(--space-2xl);

    display:flex;
    flex-direction:column;
    gap:var(--space-xl);
}

.intro-text h1{
    font-size:1.5rem;
    line-height:1.3;

    color:white;

    font-family:"Courier New",monospace;
}

.intro-text p{
    color:var(--text-muted);

    margin-top:var(--space-xs);

    font-family:"Courier New",monospace;
}

/* GRID */

.nav-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:var(--space-lg);
}

.grid-card{
    background:var(--box-bg);

    border:1px solid var(--border-color);

    border-radius:var(--radius-lg);

    min-height:190px;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    position:relative;
    overflow:hidden;

    text-decoration:none;

    transition:
        border-color var(--transition-fast),
        background-color var(--transition-fast),
        transform var(--transition-fast);
}

.grid-card:hover{
    border-color:var(--accent-light);
}

.grid-card:active{
    transform:scale(0.98);
    background:#1e1924;
}

.grid-card h2{
    color:white;

    font-family:"Courier New",monospace;

    font-size:1.1rem;

    margin-bottom:var(--space-xl);

    text-align:center;

    z-index:2;
}

/* ORIGINAL 3D CUBE */

.cube-viewport{
    width:70px;
    height:70px;

    perspective:300px;

    display:flex;
    justify-content:center;
    align-items:center;

    z-index:2;
}

.cube-object{
    width:50px;
    height:50px;

    position:relative;

    transform-style:preserve-3d;

    transform:
        rotateX(-20deg)
        rotateY(25deg)
        rotateZ(0deg);

    transition:
        transform 0.95s cubic-bezier(0.15,0.85,0.35,1);
}

.cube-object.is-idling{
    animation: idleFloat 6s ease-in-out infinite alternate;
}

.cube-face{
    position:absolute;

    width:50px;
    height:50px;

    background-image:url('assets/minecraft/r-un.png');
    background-size:cover;

    image-rendering:pixelated;
}

.face-front  { transform: rotateY(0deg) translateZ(25px); }
.face-back   { transform: rotateY(180deg) translateZ(25px); }
.face-left   { transform: rotateY(-90deg) translateZ(25px); }
.face-right  { transform: rotateY(90deg) translateZ(25px); }
.face-top    { transform: rotateX(90deg) translateZ(25px); }
.face-bottom { transform: rotateX(-90deg) translateZ(25px); }

@keyframes idleFloat{
    0%{
        transform:
            rotateX(-15deg)
            rotateY(20deg)
            rotateZ(0deg)
            translateY(0px);
    }

    100%{
        transform:
            rotateX(-25deg)
            rotateY(40deg)
            rotateZ(2deg)
            translateY(-6px);
    }
}

.placeholder-text{
    color:white;
    font-family:"Courier New",monospace;
}

/* FOOTER */

.footer{
    margin-top:32px;

    padding-bottom:16px;

    text-align:center;

    display:flex;
    flex-direction:column;
    gap:8px;

    align-items:center;
}

.footer-title{
    font-size:12px;

    color:var(--text-muted);

    opacity:0.75;
}

.footer-links{
    display:flex;
    gap:12px;

    flex-wrap:wrap;

    justify-content:center;
}

.footer-links a{
    color:var(--accent-light);

    text-decoration:none;

    font-size:13px;

    display:flex;
    align-items:center;
    gap:6px;

    transition:0.15s ease;
}

.footer-links a:hover{
    color:var(--accent-light-hover);
}

.footer-links img{
    width:18px;
    height:18px;

    filter:brightness(0) invert(1);
}

.footer-links a.kofi{
    color:#ff5fa2;
}

/* MOBILE */

@media(max-width:600px){

    .page-wrapper{
        padding:var(--space-lg) var(--space-sm);
    }

}
</style>
</head>

<body>

<header class="site-header">

    <div class="header-inner">

        <button class="settings-btn" id="openSidebar">

            <svg viewBox="0 0 24 24"
            style="width:20px;height:20px;fill:#ffffff;">
                <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
            </svg>

        </button>

        <div class="site-title">
            <span class="title-bold">NAKO HIKARI</span>
        </div>

    </div>

</header>

<div class="overlay" id="sidebarOverlay"></div>

<nav class="side-tab" id="leftSidebar">

    <div class="side-tab-header">

        <h4>SETTINGS</h4>

        <button class="close-btn" id="closeSidebar">
            &times;
        </button>

    </div>

    <div class="side-links">

        <a href="pages/about.html">About</a>

        <a href="pages/supporters.html">Supporters</a>

        <a href="pages/credits.html">Credits</a>

    </div>

</nav>

<div class="page-wrapper">

<main class="main-container">

<div class="intro-text">

<h1>
minecraft command creations
</h1>

<p>
visual showcase platform for minecraft bedrock commands
</p>

</div>

<div class="nav-grid">

<a href="pages/commands.html"
class="grid-card"
id="exploreCard">

<h2>
COMMAND BLOCK CREATION
</h2>

<div class="cube-viewport">

<div class="cube-object is-idling"
id="avatarCube">

<div class="cube-face face-front"></div>
<div class="cube-face face-back"></div>
<div class="cube-face face-left"></div>
<div class="cube-face face-right"></div>
<div class="cube-face face-top"></div>
<div class="cube-face face-bottom"></div>

</div>

</div>

</a>

<div class="grid-card">

<div class="placeholder-text">
RANDOM PICK
</div>

</div>

</div>

</main>

<div class="footer">

<div class="footer-title">
By Nako Hikari
</div>

<div class="footer-links">

<a href="https://github.com/nako-hikari/" target="_blank">

<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/github.svg">

GitHub

<a href="https://m.youtube.com/@NaCryst" target="_blank">

TikTok

target="_blank"
class="kofi">

<img src="https://raw.githubusercontent.com/nako-hikari/support-files/main/assets/kofi-icon.png">

Support me on Ko-fi

</div>

</div>

</div>

<script>
const sidebar = document.getElementById('leftSidebar');
const overlay = document.getElementById('sidebarOverlay');

document.getElementById('openSidebar')
.onclick = () => {

    sidebar.classList.add('open');
    overlay.classList.add('visible');

};

document.getElementById('closeSidebar')
.onclick = () => {

    sidebar.classList.remove('open');
    overlay.classList.remove('visible');

};

overlay.onclick = () => {

    sidebar.classList.remove('open');
    overlay.classList.remove('visible');

};

/* ORIGINAL RANDOM SPIN */

const exploreCard = document.getElementById('exploreCard');
const avatarCube = document.getElementById('avatarCube');

let targetX = -20;
let targetY = 25;
let targetZ = 0;

const triggerRandomSpin = () => {

    avatarCube.classList.remove('is-idling');

    targetX +=
        (Math.floor(Math.random() * 180) + 180)
        * (Math.random() > 0.5 ? 1 : -1);

    targetY +=
        (Math.floor(Math.random() * 180) + 180)
        * (Math.random() > 0.5 ? 1 : -1);

    targetZ +=
        (Math.floor(Math.random() * 90) + 90);

    avatarCube.style.transform =
        `rotateX(${targetX}deg)
         rotateY(${targetY}deg)
         rotateZ(${targetZ}deg)`;
};

const resetCubeFloat = () => {

    setTimeout(() => {

        if(!exploreCard.matches(':hover')){

            avatarCube.classList.add('is-idling');

        }

    },950);

};

exploreCard.addEventListener('mouseenter',triggerRandomSpin);

exploreCard.addEventListener('mouseleave',resetCubeFloat);

exploreCard.addEventListener('click',() => {

    triggerRandomSpin();
    resetCubeFloat();

});
</script>

</body>
</html>
