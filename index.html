<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nako Hikari</title>

<style>
:root {
    /* Nako-Default-Purple Color Palette */
    --bg-color: #0e0e11;
    --container-bg: #18181f;
    --input-bg: #0f0f12;
    --box-bg: #0f0f12;
    --accent-dark: #663657;
    --accent-dark-hover: #81456e;
    --accent-light: #A77A99;
    --accent-light-hover: #c5a4bc;
    --text-main: #b4b4bc;
    --text-muted: #5a5a66;
    --text-bright: #ffffff;
    --border-color: #2d2d38;
    --success-bg: #2a4f32;
    --success-border: #3b6e47;

    /* Spacing & Layout Scale */
    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 12px;
    --space-lg: 16px;
    --space-xl: 20px;
    --space-2xl: 24px;
    --max-width: 900px;

    /* Borders & Depth Elevation */
    --radius-sm: 4px;
    --radius-md: 6px;
    --radius-lg: 8px;
    --border-width: 1px;
    --shadow-deep: 0 6px 16px rgba(0, 0, 0, 0.6);
    --shadow-soft: 0 2px 6px rgba(0, 0, 0, 0.3);

    /* Animation & Transitions */
    --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
    --transition-normal: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    -webkit-tap-highlight-color:transparent;
}

body{
    background:var(--bg-color);
    color:var(--text-main);

    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;

    font-size:14px;
    line-height:1.5;

    min-height:100vh;

    overflow-x:hidden;

    padding-top:60px;
}

/* HEADER */

.site-header{
    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:60px;

    background:var(--bg-color);

    border-bottom:var(--border-width) solid var(--border-color);

    display:flex;
    align-items:center;
    justify-content:center;

    z-index:1000;
}

.header-inner{
    width:100%;
    max-width:var(--max-width);

    display:flex;
    align-items:center;

    position:relative;

    padding:0 var(--space-lg);
}

.settings-btn{
    background:var(--container-bg);

    border:var(--border-width) solid var(--border-color);

    width:38px;
    height:38px;

    border-radius:var(--radius-md);

    display:flex;
    justify-content:center;
    align-items:center;

    position:absolute;
    left:var(--space-lg);

    cursor:pointer;

    transition:
        border-color var(--transition-fast),
        background-color var(--transition-fast),
        transform var(--transition-fast);
}

.settings-btn:hover{
    border-color:var(--accent-light);
}

.settings-btn:active{
    transform:scale(0.92);
    background:#1e1924;
    border-color:var(--accent-light-hover);
}

.site-title{
    margin:0 auto;

    letter-spacing:0.25em;
    text-transform:uppercase;

    user-select:none;

    font-size:1.25rem;
}

.title-bold{
    color:#ffffff;
    font-weight:800;
}

/* SIDEBAR */

.overlay{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.4);

    opacity:0;
    visibility:hidden;

    z-index:1500;

    transition:opacity var(--transition-normal);
}

.overlay.visible{
    opacity:1;
    visibility:visible;
}

.side-tab{
    position:fixed;

    top:0;
    left:-280px;

    width:280px;
    height:100%;

    background:var(--container-bg);

    border-right:var(--border-width) solid var(--border-color);

    box-shadow:var(--shadow-deep);

    z-index:2000;

    transition:left var(--transition-normal);

    padding:var(--space-2xl) var(--space-lg);

    display:flex;
    flex-direction:column;
    gap:var(--space-xl);
}

.side-tab.open{
    left:0;
}

.side-tab-header{
    display:flex;
    justify-content:space-between;
    align-items:center;

    border-bottom:var(--border-width) solid var(--border-color);

    padding-bottom:var(--space-md);
}

.side-tab-header h4{
    color:var(--text-bright);

    font-family:"Courier New",Courier,monospace;

    font-size:1.1rem;
}

.close-btn{
    background:none;
    border:none;

    color:var(--text-main);

    font-size:20px;

    cursor:pointer;
}

.side-links{
    display:flex;
    flex-direction:column;
    gap:var(--space-md);
}

.side-links a{
    color:var(--text-main);

    text-decoration:none;

    font-family:"Courier New",Courier,monospace;

    padding:var(--space-sm) var(--space-md);

    border-radius:var(--radius-sm);

    transition:
        background-color var(--transition-fast),
        color var(--transition-fast);
}

.side-links a:hover{
    background:var(--box-bg);
    color:var(--text-bright);
}

.side-links a:active{
    transform:scale(0.98);
    background:#1e1924;
    border-color:var(--accent-light-hover);
}

/* MAIN */

.page-wrapper{
    width:100%;
    max-width:var(--max-width);

    margin:0 auto;

    display:flex;
    flex-direction:column;
    gap:var(--space-xl);

    padding:var(--space-2xl) var(--space-lg);
}

.main-container{
    background:var(--container-bg);

    border:var(--border-width) solid var(--border-color);

    border-radius:var(--radius-lg);

    box-shadow:var(--shadow-deep);

    padding:var(--space-2xl);

    display:flex;
    flex-direction:column;
    gap:var(--space-xl);
}

.intro-text h1{
    font-size:1.5rem;
    font-weight:600;
    line-height:1.3;

    color:var(--text-bright);

    font-family:"Courier New",Courier,monospace;
}

.intro-text p{
    color:var(--text-muted);

    margin-top:var(--space-xs);

    font-family:"Courier New",Courier,monospace;
}

/* GRID */

.nav-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:var(--space-lg);
}

.grid-card{
    background:var(--box-bg);

    border:var(--border-width) solid var(--border-color);

    border-radius:var(--radius-lg);

    min-height:190px;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    position:relative;
    overflow:hidden;

    text-decoration:none;

    cursor:pointer;

    transition:
        border-color var(--transition-fast),
        background-color var(--transition-fast),
        transform var(--transition-fast);
}

.grid-card:hover{
    border-color:var(--accent-light);
}

.grid-card:active{
    transform:scale(0.98);
    background:#1e1924;
    border-color:var(--accent-light-hover);
}

.grid-card h2{
    color:var(--text-bright);

    font-family:"Courier New",Courier,monospace;

    font-size:1.1rem;

    text-transform:uppercase;

    letter-spacing:0.5px;

    margin-bottom:var(--space-xl);

    text-align:center;

    z-index:2;
}

/* CUBE */

.cube-viewport{
    width:70px;
    height:70px;

    perspective:300px;

    display:flex;
    align-items:center;
    justify-content:center;

    z-index:2;
}

.cube-object{
    width:50px;
    height:50px;

    position:relative;

    transform-style:preserve-3d;

    transform:
        rotateX(-20deg)
        rotateY(25deg)
        rotateZ(0deg);

    transition:
        transform 0.95s cubic-bezier(0.15,0.85,0.35,1);
}

.cube-object.is-idling{
    animation:idleFloat 6s ease-in-out infinite alternate;
}

.cube-face{
    position:absolute;

    width:50px;
    height:50px;

    background-image:url('assets/images/cmd-texture.png');
    background-size:300% 100%;

    image-rendering:pixelated;
}

/* SIDES */

.face-front{
    transform:rotateY(0deg) translateZ(25px);
    background-position:50% 0;
}

.face-back{
    transform:rotateY(180deg) translateZ(25px) scaleX(-1);
    background-position:50% 0;
}

.face-left{
    transform:rotateY(-90deg) translateZ(25px) scaleX(-1);
    background-position:50% 0;
}

.face-right{
    transform:rotateY(90deg) translateZ(25px) scaleX(-1);
    background-position:50% 0;
}

/* TOP */

.face-top{
    transform:rotateX(90deg) translateZ(25px) scaleY(-1);
    background-position:0% 0;
}

/* BOTTOM */

.face-bottom{
    transform:rotateX(-90deg) translateZ(25px) scaleY(-1);
    background-position:100% 0;
}

@keyframes idleFloat{
    0%{
        transform:
            rotateX(-15deg)
            rotateY(20deg)
            rotateZ(0deg)
            translateY(0px);
    }

    100%{
        transform:
            rotateX(-25deg)
            rotateY(40deg)
            rotateZ(2deg)
            translateY(-6px);
    }
}

.placeholder-text{
    color:var(--text-bright);

    font-family:"Courier New",Courier,monospace;

    font-size:1.1rem;
}

/* FOOTER */

.footer {
    margin-top: var(--space-2xl, 32px);
    padding-bottom: var(--space-lg, 16px);
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: var(--space-sm, 8px);
    align-items: center;
    width: 100%;
}

.footer-title {
    font-size: 12px;
    color: var(--text-muted, #5a5a66);
    opacity: 0.75;
    letter-spacing: 0.5px;
}

.footer-links {
    display: flex;
    gap: var(--space-md, 12px);
    flex-wrap: wrap;
    justify-content: center;
}

.footer-links a {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--accent-light, #A77A99);
    text-decoration: none;
    font-size: 13px;
    opacity: 0.85;
    transition:
        opacity var(--transition-fast, 0.15s),
        color var(--transition-fast, 0.15s);
}

.footer-links a:hover {
    color: var(--accent-light-hover, #c5a4bc);
    opacity: 1;
}

.footer-links img {
    width: 16px;
    height: 16px;
    filter: brightness(0) invert(1);
    opacity: 0.9;
}

.footer-links a.kofi {
    color: #ff5fa2;
    font-weight: 500;
}

.footer-links a.kofi:hover {
    color: #ff8fc0;
}

.footer-links a.kofi img {
    width: 20px;
    height: 20px;
    filter: brightness(0) invert(1);
    opacity: 0.95;
}

/* MOBILE */

@media (max-width:600px){

    .page-wrapper{
        padding:var(--space-lg) var(--space-sm);
    }

}
</style>
</head>

<body>

<header class="site-header">

    <div class="header-inner">

        <button class="settings-btn" id="openSidebar">

            <svg viewBox="0 0 24 24"
            style="width:20px;height:20px;fill:#ffffff;">
                <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
            </svg>

        </button>

        <div class="site-title">
            <span class="title-bold">NAKO HIKARI</span>
        </div>

    </div>

</header>

<div class="overlay" id="sidebarOverlay"></div>

<nav class="side-tab" id="leftSidebar">

    <div class="side-tab-header">

        <h4>SETTINGS</h4>

        <button class="close-btn" id="closeSidebar">
            &times;
        </button>

    </div>

    <div class="side-links">

        <a href="pages/about.html">About</a>

        <a href="pages/supporters.html">Supporters</a>

        <a href="pages/credits.html">Credits</a>

    </div>

</nav>

<div class="page-wrapper">

    <main class="main-container">

        <div class="intro-text">

            <h1>
                minecraft command creations
            </h1>

            <p>
                visual showcase platform for minecraft bedrock commands
            </p>

        </div>

        <div class="nav-grid">

            <a href="pages/commands.html"
            class="grid-card"
            id="exploreCard">

                <h2>
                    COMMAND BLOCK CREATION
                </h2>

                <div class="cube-viewport">

                    <div class="cube-object is-idling"
                    id="avatarCube">

                        <div class="cube-face face-front"></div>
                        <div class="cube-face face-back"></div>
                        <div class="cube-face face-left"></div>
                        <div class="cube-face face-right"></div>
                        <div class="cube-face face-top"></div>
                        <div class="cube-face face-bottom"></div>

                    </div>

                </div>

            </a>

            <div class="grid-card">

                <div class="placeholder-text">
                    RANDOM PICK
                </div>

            </div>

        </div>

    </main>

    <div class="footer">
        <div class="footer-title">By Nako Hikari</div>

        <div class="footer-links">

            <a href="https://github.com/nako-hikari/"
            target="_blank"
            class="social">

                <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/github.svg"
                alt="GitHub">

                GitHub

            </a>

            <a href="https://m.youtube.com/@NaCryst"
            target="_blank"
            class="social">

                <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg"
                alt="YouTube">

                YouTube

            </a>

            <a href="https://www.tiktok.com/@nako_hikari_mc"
            target="_blank"
            class="social">

                <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/tiktok.svg"
                alt="TikTok">

                TikTok

            </a>

            <a href="https://ko-fi.com/arialicee"
            target="_blank"
            class="social kofi">

                <img src="https://raw.githubusercontent.com/nako-hikari/support-files/main/assets/kofi-icon.png"
                alt="Ko-fi">

                Support me on Ko-fi

            </a>

        </div>

    </div>

</div>

<script>
const sidebar = document.getElementById('leftSidebar');
const overlay = document.getElementById('sidebarOverlay');

document.getElementById('openSidebar')
.onclick = () => {

    sidebar.classList.add('open');
    overlay.classList.add('visible');

};

document.getElementById('closeSidebar')
.onclick = () => {

    sidebar.classList.remove('open');
    overlay.classList.remove('visible');

};

overlay.onclick = () => {

    sidebar.classList.remove('open');
    overlay.classList.remove('visible');

};

const exploreCard = document.getElementById('exploreCard');
const avatarCube = document.getElementById('avatarCube');

let targetX = -20;
let targetY = 25;
let targetZ = 0;

const triggerRandomSpin = () => {

    avatarCube.classList.remove('is-idling');

    targetX +=
        (Math.floor(Math.random() * 180) + 180)
        * (Math.random() > 0.5 ? 1 : -1);

    targetY +=
        (Math.floor(Math.random() * 180) + 180)
        * (Math.random() > 0.5 ? 1 : -1);

    targetZ +=
        (Math.floor(Math.random() * 90) + 90);

    avatarCube.style.transform =
        `rotateX(${targetX}deg)
        rotateY(${targetY}deg)
        rotateZ(${targetZ}deg)`;

};

const resetCubeFloat = () => {

    setTimeout(() => {

        if(!exploreCard.matches(':hover')){

            avatarCube.classList.add('is-idling');

        }

    },950);

};

exploreCard.addEventListener('mouseenter',triggerRandomSpin);

exploreCard.addEventListener('mouseleave',resetCubeFloat);

exploreCard.addEventListener('click',() => {

    triggerRandomSpin();
    resetCubeFloat();

});
</script>

</body>
</html>
