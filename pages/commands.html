<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Command Viewer</title>

<style>
:root {
    --bg-color: #0e0e11;
    --container-bg: #18181f;
    --input-bg: #0f0f12;
    --box-bg: #0f0f12;

    --accent-dark: #663657;
    --accent-dark-hover: #81456e;
    --accent-light: #A77A99;
    --accent-light-hover: #c5a4bc;

    --text-main: #b4b4bc;
    --text-muted: #5a5a66;
    --text-bright: #ffffff;

    --border-color: #2d2d38;

    --space-sm: 8px;
    --space-md: 12px;
    --space-lg: 16px;
    --space-xl: 20px;
    --space-2xl: 24px;

    --radius-md: 6px;
    --radius-lg: 8px;

    --shadow-deep: 0 6px 16px rgba(0,0,0,.6);
    --transition-fast: 0.15s cubic-bezier(.4,0,.2,1);
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    -webkit-tap-highlight-color: transparent;
}

body{
    background:var(--bg-color);
    color:var(--text-main);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: var(--space-lg);
    display:flex;
    justify-content:center;
}

.wrapper{
    width:100%;
    max-width:900px;
    display:flex;
    flex-direction:column;
    gap:var(--space-lg);
}

/* TOP INPUT */
.editor{
    background:var(--container-bg);
    border:1px solid var(--border-color);
    border-radius:var(--radius-lg);
    padding:var(--space-lg);
    box-shadow:var(--shadow-deep);
    display:flex;
    flex-direction:column;
    gap:var(--space-md);
}

textarea{
    width:100%;
    min-height:140px;
    resize:none;
    background:var(--input-bg);
    border:1px solid var(--border-color);
    border-radius:var(--radius-md);
    color:var(--text-bright);
    padding:var(--space-md);
    font-family: "Courier New", monospace;
    outline:none;
}

button{
    background:var(--accent-dark);
    color:white;
    border:none;
    padding:10px 12px;
    border-radius:var(--radius-md);
    cursor:pointer;
    transition:var(--transition-fast);
    text-transform:uppercase;
    font-size:12px;
}

button:hover{
    background:var(--accent-dark-hover);
}

/* OUTPUT */
.viewer{
    display:flex;
    flex-direction:column;
    gap:var(--space-md);
}

.block{
    background:var(--container-bg);
    border:1px solid var(--border-color);
    border-radius:var(--radius-lg);
    padding:var(--space-md);
    box-shadow:var(--shadow-deep);
}

.h{
    font-weight:700;
    color:var(--text-bright);
    text-transform:uppercase;
    font-size:14px;
}

.sh{
    color:var(--text-main);
    font-size:13px;
}

.note{
    color:var(--text-muted);
    font-style:italic;
}

/* COMMAND BLOCK */
.cmd-group{
    display:flex;
    flex-direction:column;
    gap:6px;
}

.cmd-row{
    display:flex;
    align-items:stretch;
    gap:8px;
}

.cmd-num{
    width:28px;
    text-align:center;
    font-family:monospace;
    color:var(--accent-light);
    display:flex;
    align-items:center;
    justify-content:center;
}

.cmd-icon{
    width:32px;
    height:32px;
    background-image:url("assets/images/cmd-texture.png");
    background-size:300% 100%;
    background-position:50% 0;
    border:1px solid var(--border-color);
    border-radius:4px;
    flex-shrink:0;
}

.cmd-text{
    flex:1;
    overflow-x:auto;
    white-space:nowrap;
    background:var(--input-bg);
    border:1px solid var(--border-color);
    border-radius:var(--radius-md);
    padding:6px 8px;
    font-family:monospace;
    cursor:pointer;
}

.cmd-text.expanded{
    white-space:normal;
}

.copy{
    background:transparent;
    border:1px solid var(--border-color);
    padding:0 8px;
    font-size:11px;
}

/* flip mode */
.flipped .cmd-group{
    flex-direction:column-reverse;
}

.flipped .cmd-icon{
    transform:none;
    filter:brightness(1.1);
}

/* FOOTER */
.footer{
    margin-top:30px;
    text-align:center;
    font-size:12px;
    color:var(--text-muted);
}

/* STRUCTURE */
.structure-bar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px;
    border:1px solid var(--border-color);
    border-radius:var(--radius-lg);
    background:var(--container-bg);
}

.structure-left{
    display:flex;
    align-items:center;
    gap:10px;
}

.structure-left img{
    width:22px;
    height:22px;
}
</style>
</head>

<body>

<div class="wrapper">

    <div class="editor">
        <textarea id="input">
# Header Example
## Sub header example
! note this is a note
cmd: say hello
cmd: give @p stone
cmd: flip
cmd: tp @p 0 64 0
        </textarea>
        <button onclick="parse()">Render</button>
    </div>

    <div id="viewer" class="viewer"></div>

    <div class="structure-bar" id="structureBar" style="display:none;">
        <div class="structure-left">
            <img id="structureIcon" src="assets/images/structure-un.png"/>
            <div id="structureName">no structure</div>
        </div>
        <button onclick="downloadStructure()">download</button>
    </div>

    <div class="footer">by nako hikari</div>

</div>

<script>
let viewer = document.getElementById("viewer");

function parse(){
    const lines = document.getElementById("input").value.split("\n");

    viewer.innerHTML = "";

    let cmdGroup = null;
    let cmdCount = 0;
    let flipped = false;

    lines.forEach(line=>{
        line = line.trim();
        if(!line) return;

        if(line.startsWith("# ")){
            addBlock("h", line.replace("# ",""));
            return;
        }

        if(line.startsWith("## ")){
            addBlock("sh", line.replace("## ",""));
            return;
        }

        if(line.startsWith("!")){
            addBlock("note", line.replace("! ",""));
            return;
        }

        if(line.startsWith("cmd:")){
            let content = line.replace("cmd:","").trim();

            if(content === "flip"){
                flipped = !flipped;
                return;
            }

            if(!cmdGroup){
                cmdGroup = document.createElement("div");
                cmdGroup.className = "cmd-group";
                viewer.appendChild(cmdGroup);
                cmdCount = 0;
            }

            cmdCount++;

            const row = document.createElement("div");
            row.className = "cmd-row";

            const num = document.createElement("div");
            num.className = "cmd-num";
            num.textContent = cmdCount;

            const icon = document.createElement("div");
            icon.className = "cmd-icon";

            const text = document.createElement("div");
            text.className = "cmd-text";
            text.textContent = content;

            text.onclick = ()=>{
                text.classList.toggle("expanded");
            };

            const copy = document.createElement("button");
            copy.className = "copy";
            copy.textContent = "copy";
            copy.onclick = ()=>{
                navigator.clipboard.writeText(content);
            };

            row.appendChild(num);
            row.appendChild(icon);
            row.appendChild(text);
            row.appendChild(copy);

            cmdGroup.appendChild(row);
            return;
        }

        function addBlock(type, text){
            const div = document.createElement("div");
            div.className = "block " + type;
            div.textContent = text;
            viewer.appendChild(div);
        }
    });

    if(flipped){
        viewer.classList.add("flipped");
    } else {
        viewer.classList.remove("flipped");
    }

    updateStructure();
}

/* STRUCTURE DETECT */
function updateStructure(){
    let raw = document.getElementById("input").value;
    let match = raw.match(/structure:\s*(\w+)/i);

    let bar = document.getElementById("structureBar");
    let img = document.getElementById("structureIcon");
    let name = document.getElementById("structureName");

    if(match){
        let file = match[1];

        fetch("structures/"+file+".txt")
        .then(r=>{
            if(r.ok){
                img.src = "assets/images/structure.png";
            } else {
                img.src = "assets/images/structure-un.png";
            }
        })
        .catch(()=>{
            img.src = "assets/images/structure-un.png";
        });

        name.textContent = file;
        bar.style.display = "flex";
    } else {
        bar.style.display = "none";
    }
}

function downloadStructure(){
    let raw = document.getElementById("input").value;
    let match = raw.match(/structure:\s*(\w+)/i);
    if(!match) return;

    let file = match[1];
    window.open("structures/"+file+".txt","_blank");
}
</script>

</body>
</html>
